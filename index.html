<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operating Plan · Gantt</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%230F172A'/><rect x='3' y='4' width='7' height='2' rx='1' fill='%2317BECF'/><rect x='3' y='7' width='10' height='2' rx='1' fill='%2310B981'/><rect x='3' y='10' width='5' height='2' rx='1' fill='%23FF7F0E'/></svg>">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="page">
  <header class="mast">
    <div class="mast-l">
      <h1>Operating Plan</h1>
      <div class="sub" id="sub"></div>
    </div>
    <div class="mast-r">
      <div class="asof" id="asof">Loading…</div>
      <div class="sync" id="sync" data-state="local"><span class="dot"></span><span class="txt">…</span></div>
    </div>
  </header>

  <nav class="toolbar">
    <div class="tabs" id="tabs"></div>
    <div class="tools">
      <button class="btn ghost icon" id="muteBtn" title="Sound">🔊</button>
      <button class="btn ghost" id="manageBtn">Businesses</button>
      <button class="btn primary" id="addBtn">+ Add task</button>
    </div>
  </nav>

  <div class="legend" id="legend"></div>
  <div class="hidden-note" id="hiddenNote"></div>

  <div class="card">
    <div class="gantt">
      <div class="gcol-labels">
        <div class="lab-head" id="labHead">
          <div class="h-task">Workstream / Task</div>
          <div class="h-date">Start</div>
          <div class="h-date">Original<br>end</div>
          <div class="h-date hi">New<br>end</div>
        </div>
        <div id="labels"></div>
      </div>
      <div class="gcol-time" id="timeScroll">
        <div class="time-inner" id="timeInner">
          <div class="axis" id="axis"></div>
          <div class="plot" id="plot">
            <div class="bg" id="bg"></div>
            <div class="rows" id="rows"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="notes" id="notes"></div>
</div>

<div id="tip"></div>
<div class="modal-backdrop" id="modal"></div>
<div id="toast"></div>

<script type="module" src="/app.js"></script>
</body>
</html>
